services:
  postgres:
    image: postgres:16-alpine
    container_name: cc-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: payments
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d payments"]
      interval: 5s
      timeout: 3s
      retries: 20

  kafka:
    image: apache/kafka:3.7.1
    container_name: cc-kafka
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20

  kafka-init-topics:
    image: apache/kafka:3.7.1
    container_name: cc-kafka-init-topics
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /bin/bash
      - -lc
      - |
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment.created.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment.failed.v1 --partitions 3 --replication-factor 1
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists --topic payment.settled.v1 --partitions 3 --replication-factor 1

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: cc-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    ports:
      - "8080:8080"

  db-migrate:
    build:
      context: .
      dockerfile: apps/payment-api/Dockerfile
    container_name: cc-db-migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payments?schema=public
    command: ["pnpm", "prisma:migrate:deploy"]

  payment-api:
    build:
      context: .
      dockerfile: apps/payment-api/Dockerfile
    container_name: cc-payment-api
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka-init-topics:
        condition: service_completed_successfully
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payments?schema=public
      KAFKA_BROKERS: kafka:9092
    ports:
      - "3000:3000"

  outbox-relay:
    build:
      context: .
      dockerfile: apps/outbox-relay/Dockerfile
    container_name: cc-outbox-relay
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka-init-topics:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payments?schema=public
      KAFKA_BROKERS: kafka:9092

  fraud-worker:
    build:
      context: .
      dockerfile: apps/fraud-worker/Dockerfile
    container_name: cc-fraud-worker
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka-init-topics:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payments?schema=public
      KAFKA_BROKERS: kafka:9092
      FRAUD_GROUP_ID: fraud-worker-group

  ledger-worker:
    build:
      context: .
      dockerfile: apps/ledger-worker/Dockerfile
    container_name: cc-ledger-worker
    depends_on:
      db-migrate:
        condition: service_completed_successfully
      kafka-init-topics:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/payments?schema=public
      KAFKA_BROKERS: kafka:9092
      LEDGER_GROUP_ID: ledger-worker-group

volumes:
  pg-data:
